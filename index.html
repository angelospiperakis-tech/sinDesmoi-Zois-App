<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ΣύνΔεσμοί Ζωής</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
    margin-bottom: 20px;
}

h2 {
    margin-bottom: 10px;
}

input, select {
    width: 90%;
    padding: 10px;
    margin: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 95%;
    padding: 12px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #00c6ff;
}

.delete-btn {
    background: red;
    padding: 5px;
    border-radius: 6px;
    color: white;
}

table {
    width: 95%;
    background: white;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #4facfe;
    color: white;
}
</style>

</head>

<body>

<div class="container">

<h2>ΣύνΔεσμοί Ζωής</h2>
<p>Ειδικός Κωδικός</p>

<input id="name" placeholder="Όνομα">
<input id="surname" placeholder="Επώνυμο">

<select id="area">
    <option value="">Επιλογή Περιοχής</option>
    <option value="ΠΕΤΡ">Πετρούπολη</option>
    <option value="ΠΛΠΕ">Πλατεία Πετρούπολης</option>
    <option value="ΚΗΠΟ">Κηπούπολη</option>
    <option value="ΙΛΙΟ">Ίλιον</option>
</select>

<input id="email" placeholder="Email">

<button onclick="send()">Δημιουργία</button>

<p id="result"></p>

</div>

<h3>Πελάτες</h3>

<table id="clientsTable">
<tr>
<th>Όνομα</th>
<th>Επώνυμο</th>
<th>Περιοχή</th>
<th>Email</th>
<th>Κωδικός</th>
<th>Διαγραφή</th>
</tr>
</table>

<script>
async function send() {

    const res = await fetch("/create", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: name.value,
            surname: surname.value,
            area: area.value,
            email: email.value
        })
    });

    const data = await res.json();

    result.innerText = "Κωδικός: " + data.code;

    loadClients();
}

async function loadClients() {
    const res = await fetch("/clients");
    const data = await res.json();

    const table = document.getElementById("clientsTable");

    table.innerHTML = `
    <tr>
        <th>Όνομα</th>
        <th>Επώνυμο</th>
        <th>Περιοχή</th>
        <th>Email</th>
        <th>Κωδικός</th>
        <th>Διαγραφή</th>
    </tr>
    `;

    data.forEach(c => {
        table.innerHTML += `
        <tr>
            <td>${c.name}</td>
            <td>${c.surname}</td>
            <td>${c.area}</td>
            <td>${c.email}</td>
            <td>${c.code}</td>
            <td><button class="delete-btn" onclick="deleteClient(${c.id})">❌</button></td>
        </tr>`;
    });
}

async function deleteClient(id) {
    if (!confirm("Σίγουρα θέλεις διαγραφή;")) return;

    await fetch("/delete/" + id, {
        method: "DELETE"
    });

    loadClients();
}

loadClients();
</script>

</body>
</html>
